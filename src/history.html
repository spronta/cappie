<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cappie — capture history</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0b0b0f; color: #fafafa; min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 28px; border-bottom: 1px solid #27272a;
  }
  header h1 { font-size: 17px; margin: 0; letter-spacing: -0.01em; }
  header h1 b { color: #a3e635; }
  header .count { color: #a1a1aa; font-size: 13px; }
  header .flex { flex: 1; }
  button {
    appearance: none; border: 1px solid #27272a; background: #18181b; color: #fafafa;
    font-size: 12px; line-height: 1; padding: 8px 11px; border-radius: 7px; cursor: pointer;
  }
  button:hover { background: #27272a; }
  button.danger:hover { background: #7f1d1d; border-color: #b91c1c; }
  main {
    padding: 24px 28px; display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden; }
  .thumbwrap {
    height: 180px; display: flex; align-items: center; justify-content: center;
    background: conic-gradient(#26262b 90deg, #1c1c21 90deg 180deg, #26262b 180deg 270deg, #1c1c21 270deg) 0 0/20px 20px;
    border-bottom: 1px solid #27272a;
  }
  .thumbwrap img { max-width: 100%; max-height: 100%; }
  .thumbwrap .nothumb { color: #52525b; font-size: 12px; }
  .meta { padding: 12px 14px 0; }
  .meta b { display: block; font-size: 13px; color: #a3e635; font-weight: 600; }
  .meta .dims { color: #a1a1aa; font-size: 12px; margin-top: 3px; }
  .meta a {
    display: block; color: #71717a; font-size: 11.5px; margin-top: 5px; text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .meta a:hover { color: #a1a1aa; }
  .actions { display: flex; gap: 6px; padding: 12px 14px 14px; flex-wrap: wrap; }
  .empty { color: #a1a1aa; font-size: 14px; padding: 60px 28px; text-align: center; grid-column: 1 / -1; }
</style>
</head>
<body>
  <header>
    <h1><b>Cappie</b> capture history</h1>
    <span class="count" id="count"></span>
    <span class="flex"></span>
    <button id="clear" class="danger">Clear all</button>
  </header>
  <main id="app"></main>
  <script src="history.js"></script>
</body>
</html>
